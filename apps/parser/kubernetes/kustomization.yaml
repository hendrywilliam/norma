apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: norma-parser

namePrefix: norma-

# Common labels untuk semua resources
commonLabels:
  app.kubernetes.io/name: norma-parser
  app.kubernetes.io/instance: parser
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/component: parser-api

# Resources to include
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - parser-deployment.yaml
  - parser-service.yaml
  - ingress.yaml
  - hpa.yaml

# Secret generator (untuk override di command line)
secretGenerator:
  - name: parser-secrets
    literals:
      - DB_PASSWORD=default_password_change_me

# Images untuk override
images:
  - name: norma-parser
    newName: registry.example.com/norma-parser
    newTag: latest

# ConfigMap generator untuk override values
configMapGenerator:
  - name: parser-config
    literals:
      - LOG_LEVEL=info
      - REQUEST_DELAY=1

# Patches untuk overlay
patches:
  # Override parser replicas based on environment
  - target:
      kind: Deployment
      name: parser-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
