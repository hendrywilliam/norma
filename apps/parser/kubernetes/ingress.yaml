apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  name: parser-ingress
  namespace: norma
spec:
  ingressClassName: prod
  tls:
    - hosts:
        - parser.hendrywilliam.com
      secretName: parser-tls
  rules:
    - host: parser.hendrywilliam.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parser-service
                port:
                  number: 8000