  parser:
    image: dpage/pgadmin4:latest
    container_name: peraturan_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@peraturan.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - peraturan_network
    profiles:
      - admin

  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile
    container_name: peraturan_parser
    restart: unless-stopped
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: peraturan_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - peraturan_network
    profiles:
      - parser

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  peraturan_network:
    driver: bridge
