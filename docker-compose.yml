version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: peraturan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: peraturan_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peraturan_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: peraturan_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@peraturan.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - peraturan_network
    profiles:
      - admin

  parser:
    build:
      context: ./apps/parser
      dockerfile: Dockerfile
    container_name: peraturan_parser
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/peraturan_db
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - peraturan_network
    profiles:
      - parser

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  peraturan_network:
    driver: bridge
